name: CI — Lint & Test

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint (flake8)
        run: |
          flake8 --max-line-length=120 --ignore=E501,W503,E402,F401 \
            wolf_panel.py screener_ovtlyr.py backtest_engine.py

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
